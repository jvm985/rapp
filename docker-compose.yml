services:
  mongodb:
    image: mongo:latest
    container_name: rapp-db
    volumes:
      - ./data/db:/data/db
    restart: always

  server:
    build: ./server
    container_name: rapp-server
    environment:
      - MONGO_URI=mongodb://mongodb:27017/rapp
      - JWT_SECRET=rapp-secret-123
    depends_on:
      - mongodb
    restart: always

  client:
    build: ./client
    container_name: rapp-client
    ports:
      - "127.0.0.1:8018:80"
    depends_on:
      - server
    restart: always
